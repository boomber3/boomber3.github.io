<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Pixel - 完美像素画还原</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "微软雅黑", Arial, sans-serif;
            background: var(--bg-color, #f5f5f5);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .main-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .panel {
            flex: 1;
            min-width: 300px;
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
        }
        .panel-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #6366f1;
            border-radius: 2px;
        }
        .panel-title.teal::before {
            background: #14b8a6;
        }
        
        .panel.dragover .upload-area {
            border-color: #6366f1;
            background: #f0f7ff;
        }
        
        .panel.dragover .preview-container {
            border-color: #6366f1;
            background: #f0f7ff;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .upload-area:hover {
            border-color: #6366f1;
            background: #f0f7ff;
        }
        .upload-area.dragover {
            border-color: #6366f1;
            background: #f0f7ff;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        .upload-hint {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }
        input[type="file"] {
            display: none;
        }
        .preview-container {
            width: 100%;
            min-height: 300px;
            background: repeating-conic-gradient(#ddd 0% 25%, #fff 0% 50%) 50% / 16px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .preview-container img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }
        
        .canvas-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }
        
        .canvas-wrapper canvas {
            max-width: 100%;
            max-height: 350px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .preview-placeholder {
            color: #999;
            font-size: 14px;
        }
        .preview-info {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .controls {
            margin-top: 20px;
        }
        .control-item {
            margin-bottom: 16px;
        }
        .control-item label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .control-item select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        .btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn-primary {
            background: #6366f1;
            color: white;
        }
        .btn-primary:hover {
            background: #4f46e5;
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-success {
            background: #14b8a6;
            color: white;
        }
        .btn-success:hover {
            background: #0d9488;
        }
        .btn-success:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .progress-bar {
            display: none;
            margin-top: 16px;
            background: #e5e7eb;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar.active {
            display: block;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #14b8a6);
            width: 0%;
            transition: width 0.3s;
        }
        .status-text {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        .tips {
            margin-top: 20px;
            padding: 16px;
            background: #fdf6ec;
            border-radius: 8px;
            color: #e6a23c;
            font-size: 14px;
        }
        .tips strong {
            display: block;
            margin-bottom: 8px;
        }
        .tips ol {
            margin: 0;
            padding-left: 20px;
        }
        .tips li {
            margin-bottom: 4px;
        }
        .error-box {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px;
            color: #dc2626;
            font-size: 14px;
            margin-top: 16px;
        }
        .error-box.active {
            display: block;
        }
        .grid-info {
            margin-top: 12px;
            padding: 12px;
            background: #f0fdf4;
            border-radius: 8px;
            color: #166534;
            font-size: 13px;
            text-align: center;
        }
        
        .zoom-controls {
            margin-top: 16px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
        }
        
        .zoom-row {
            margin-bottom: 12px;
        }
        
        .zoom-label-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        
        .zoom-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        
        .zoom-value {
            font-weight: bold;
            color: #6366f1;
            background: #eef2ff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 13px;
        }
        
        .zoom-slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #e5e7eb;
            outline: none;
            -webkit-appearance: none;
        }
        
        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(99, 102, 241, 0.4);
        }
        
        .zoom-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(99, 102, 241, 0.4);
        }
        
        .btn-download-scale {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #14b8a6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-download-scale:hover {
            background: #0d9488;
        }
        
        .btn-download-scale:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        
        .btn-group .btn {
            flex: 1;
            margin-top: 0;
        }
        
        .size-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
        }
        
        .size-inputs {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .size-inputs label {
            font-size: 14px;
            color: #333;
            white-space: nowrap;
        }
        
        .size-inputs input[type="number"] {
            width: 70px;
            padding: 6px 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .size-inputs span {
            color: #666;
        }
        
        .keep-ratio {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
        }
        
        .keep-ratio input {
            width: 16px;
            height: 16px;
        }
        
        .output-size-info {
            font-size: 14px;
            color: #333;
            padding: 8px;
            background: #eef2ff;
            border-radius: 6px;
            text-align: center;
        }
        
        .output-size-info span {
            font-weight: bold;
            color: #6366f1;
        }
        @media (max-width: 768px) {
            .main-area {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Perfect Pixel</h1>
        <p class="subtitle">自动检测像素网格，从模糊的像素风格图片还原清晰的像素画</p>
        
        <div class="main-area">
            <div class="panel">
                <div class="panel-title">原始图片</div>
                <div class="upload-area" id="uploadArea" style="display: block;">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">点击或拖拽图片到此处</div>
                    <div class="upload-hint">支持 PNG、JPG 等常见格式</div>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
                <div class="preview-container" id="previewContainer" style="display: none;">
                    <img id="previewImage" src="" alt="预览图片">
                    <span class="preview-info" id="previewInfo"></span>
                </div>
                <div class="controls">
                    <div class="control-item">
                        <label>采样方式</label>
                        <select id="sampleMethod">
                            <option value="center">中心采样 (Center)</option>
                            <option value="majority">众数聚类 (Majority)</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" id="processBtn" disabled>分析并生成像素画</button>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                    <p class="status-text" id="statusText"></p>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-title teal">像素画结果</div>
                <div class="preview-container" id="resultPreview">
                    <span class="preview-placeholder">等待处理...</span>
                </div>
                <div class="zoom-controls" id="zoomControls" style="display: none;">
                    <div class="zoom-row">
                        <div class="zoom-label-group">
                            <span>输出缩放:</span>
                            <span class="zoom-value" id="zoomValue">1x</span>
                        </div>
                        <input type="range" id="zoomSlider" min="1" max="16" value="1" class="zoom-slider">
                    </div>
                    <div class="size-row">
                        <div class="size-inputs">
                            <label>自定义尺寸:</label>
                            <input type="number" id="outputWidth" min="1" max="4096" value="24">
                            <span>×</span>
                            <input type="number" id="outputHeight" min="1" max="4096" value="24">
                        </div>
                        <label class="keep-ratio">
                            <input type="checkbox" id="keepRatio" checked> 保持纵横比
                        </label>
                    </div>
                    <div class="output-size-info">
                        输出尺寸: <span id="outputSizeDisplay">24 × 24</span>
                    </div>
                </div>
                <div class="grid-info" id="gridInfo" style="display:none;">
                    检测到网格: <strong id="gridSize">0 × 0</strong>
                </div>
                <div class="error-box" id="errorBox"></div>
                 <div class="btn-group">
                     <button class="btn btn-primary" id="downloadBtn" disabled>下载原尺寸</button>
                     <button class="btn btn-success" id="downloadScaleBtn" disabled>下载缩放图</button>
                 </div>
            </div>
        </div>
        
        <div class="tips">
            <strong>💡 使用说明</strong>
            <ol>
                <li>上传一张包含像素网格的图片（如被缩放或模糊的像素画截图）</li>
                <li>选择采样方式：中心采样速度快，众数聚类更精确</li>
                <li>点击"分析并生成像素画"开始处理</li>
                <li>处理完成后点击"下载像素画"保存结果</li>
            </ol>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const previewInfo = document.getElementById('previewInfo');
        const resultPreview = document.getElementById('resultPreview');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const sampleMethod = document.getElementById('sampleMethod');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const errorBox = document.getElementById('errorBox');
        const gridInfo = document.getElementById('gridInfo');
        const gridSizeEl = document.getElementById('gridSize');
        const zoomControls = document.getElementById('zoomControls');
        const zoomSlider = document.getElementById('zoomSlider');
        const zoomValue = document.getElementById('zoomValue');
        const outputWidth = document.getElementById('outputWidth');
        const outputHeight = document.getElementById('outputHeight');
        const keepRatio = document.getElementById('keepRatio');
        const outputSizeDisplay = document.getElementById('outputSizeDisplay');

        let originalImage = null;
        let originalWidth = 0;
        let originalHeight = 0;
        let processedCanvas = null;
        let refinedGridSize = null;
        let currentZoom = 1;
        let baseWidth = 24;
        let baseHeight = 24;

        function updateOutputSize() {
            const zoom = parseInt(zoomSlider.value);
            let w = baseWidth * zoom;
            let h = baseHeight * zoom;
            
            const customW = parseInt(outputWidth.value) || 1;
            const customH = parseInt(outputHeight.value) || 1;
            
            if (customW !== baseWidth * zoom || customH !== baseHeight * zoom) {
                outputWidth.value = w;
                outputHeight.value = h;
            }
            
            outputSizeDisplay.textContent = `${w} × ${h}`;
        }

        function showUploadArea() {
            uploadArea.style.display = 'block';
            previewContainer.style.display = 'none';
        }

        function showPreviewArea(src, size) {
            uploadArea.style.display = 'none';
            previewContainer.style.display = 'flex';
            previewImage.src = src;
            previewInfo.textContent = size;
        }

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        const previewWrapper = document.querySelector('.panel');
        previewWrapper.addEventListener('dragover', (e) => {
            e.preventDefault();
            previewWrapper.classList.add('dragover');
        });
        previewWrapper.addEventListener('dragleave', (e) => {
            if (e.target === previewWrapper) {
                previewWrapper.classList.remove('dragover');
            }
        });
        previewWrapper.addEventListener('drop', (e) => {
            e.preventDefault();
            previewWrapper.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('请上传图片文件');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    originalWidth = img.width;
                    originalHeight = img.height;
                    showPreviewArea(e.target.result, `${originalWidth} × ${originalHeight}`);
                    processBtn.disabled = false;
                    resultPreview.innerHTML = '<span class="preview-placeholder">等待处理...</span>';
                    gridInfo.style.display = 'none';
                    zoomControls.style.display = 'none';
                    errorBox.classList.remove('active');
                    processedCanvas = null;
                    refinedGridSize = null;
                    downloadBtn.disabled = true;
                    downloadScaleBtn.disabled = true;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.add('active');
        }

        function hideError() {
            errorBox.classList.remove('active');
        }

        function updateProgress(percent, text) {
            progressBar.classList.add('active');
            progressFill.style.width = percent + '%';
            statusText.textContent = text;
        }

        processBtn.addEventListener('click', async () => {
            if (!originalImage) return;
            hideError();
            processBtn.disabled = true;
            downloadBtn.disabled = true;
            downloadScaleBtn.disabled = true;
            zoomSlider.value = 1;
            currentZoom = 1;
            zoomValue.textContent = '1x';

            try {
                updateProgress(10, '准备图像...');
                await new Promise(r => setTimeout(r, 50));

                const result = await processPerfectPixel(originalImage, sampleMethod.value);
                
                if (result.error) {
                    showError(result.error);
                    return;
                }

                processedCanvas = result.canvas;
                refinedGridSize = result.gridSize;

                resultPreview.innerHTML = '';
                const canvasWrapper = document.createElement('div');
                canvasWrapper.className = 'canvas-wrapper';
                canvasWrapper.style.transformOrigin = 'center center';
                processedCanvas.style.width = '100%';
                processedCanvas.style.height = 'auto';
                canvasWrapper.appendChild(processedCanvas);
                resultPreview.appendChild(canvasWrapper);
                
                const sizeInfo = document.createElement('span');
                sizeInfo.className = 'preview-info';
                sizeInfo.textContent = `${result.gridSize.w} × ${result.gridSize.h}`;
                resultPreview.appendChild(sizeInfo);
                
                zoomControls.style.display = 'block';
                zoomSlider.value = 1;
                currentZoom = 1;
                zoomValue.textContent = '1x';
                baseWidth = result.gridSize.w;
                baseHeight = result.gridSize.h;
                outputWidth.value = baseWidth;
                outputHeight.value = baseHeight;
                updateOutputSize();
                
                gridInfo.style.display = 'block';
                gridSizeEl.textContent = `${result.gridSize.w} × ${result.gridSize.h}`;
                
                downloadBtn.disabled = false;
                downloadScaleBtn.disabled = false;
                updateProgress(100, '处理完成！');
                
                setTimeout(() => {
                    progressBar.classList.remove('active');
                    statusText.textContent = '';
                }, 2000);

            } catch (err) {
                showError('处理失败: ' + err.message);
                updateProgress(0, '');
            } finally {
                processBtn.disabled = false;
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!processedCanvas) return;
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = processedCanvas.width;
            tempCanvas.height = processedCanvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(processedCanvas, 0, 0);
            
            const link = document.createElement('a');
            link.download = 'perfect-pixel.png';
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
        });

        const downloadScaleBtn = document.getElementById('downloadScaleBtn');
        downloadScaleBtn.addEventListener('click', () => {
            if (!processedCanvas) return;
            
            const targetWidth = parseInt(outputWidth.value) || processedCanvas.width;
            const targetHeight = parseInt(outputHeight.value) || processedCanvas.height;
            
            const canvas = document.createElement('canvas');
            canvas.width = targetWidth;
            canvas.height = targetHeight;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(processedCanvas, 0, 0, targetWidth, targetHeight);
            
            const link = document.createElement('a');
            link.download = `perfect-pixel-${targetWidth}x${targetHeight}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        zoomSlider.addEventListener('input', (e) => {
            const zoom = parseInt(e.target.value);
            currentZoom = zoom;
            zoomValue.textContent = `${zoom}x`;
            updateOutputSize();
        });
        
        outputWidth.addEventListener('input', () => {
            if (keepRatio.checked && baseWidth > 0) {
                const ratio = baseHeight / baseWidth;
                outputHeight.value = Math.round(parseInt(outputWidth.value) || 1 * ratio);
            }
            outputSizeDisplay.textContent = `${parseInt(outputWidth.value) || 1} × ${parseInt(outputHeight.value) || 1}`;
        });
        
        outputHeight.addEventListener('input', () => {
            if (keepRatio.checked && baseHeight > 0) {
                const ratio = baseWidth / baseHeight;
                outputWidth.value = Math.round(parseInt(outputHeight.value) || 1 * ratio);
            }
            outputSizeDisplay.textContent = `${parseInt(outputWidth.value) || 1} × ${parseInt(outputHeight.value) || 1}`;
        });

        async function processPerfectPixel(img, method) {
            const maxDim = 1024;
            const minThreshold = 64;
            const targetMin = 256;
            
            let w = img.width;
            let h = img.height;
            let minSide = Math.min(w, h);
            
            if (minSide < minThreshold) {
                const k = Math.ceil((targetMin + 1) / minSide);
                w *= k;
                h *= k;
            }
            
            if (Math.max(w, h) > maxDim) {
                const s = maxDim / Math.max(w, h);
                w = Math.round(w * s);
                h = Math.round(h * s);
            } else {
                w = Math.round(w);
                h = Math.round(h);
            }

            updateProgress(20, '绘制图像到 Canvas...');
            await new Promise(r => setTimeout(r, 10));

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(img, 0, 0, w, h);
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = new Float32Array(w * h * 4);
            for (let i = 0; i < imageData.data.length; i++) {
                data[i] = imageData.data[i];
            }

            updateProgress(30, '分析像素网格 (FFT)...');
            await new Promise(r => setTimeout(r, 10));

            const imageNd = createNdArray(data, [h, w, 4]);
            const gridResult = estimateGridFft(imageNd);
            
            let scaleCol, scaleRow;
            let fftSuccess = gridResult.scaleCol !== null && gridResult.scaleRow !== null 
                && gridResult.scaleCol > 0 && gridResult.scaleRow > 0;
            
            if (fftSuccess) {
                const psx = w / gridResult.scaleCol;
                const psy = h / gridResult.scaleRow;
                if (Math.min(psx, psy) < 4.0 || Math.max(psx, psy) > 20.0) {
                    fftSuccess = false;
                } else {
                    scaleCol = gridResult.scaleCol;
                    scaleRow = gridResult.scaleRow;
                }
            }

            if (!fftSuccess) {
                updateProgress(40, 'FFT 失败，使用梯度检测...');
                await new Promise(r => setTimeout(r, 10));
                const gradResult = estimateGridGradient(imageNd);
                if (gradResult) {
                    scaleCol = gradResult.scaleCol;
                    scaleRow = gradResult.scaleRow;
                } else {
                    scaleCol = w / 8;
                    scaleRow = h / 8;
                }
            }

            if (scaleCol !== null && scaleRow !== null) {
                const psx = w / scaleCol;
                const psy = h / scaleRow;
                let finalPixelSize;
                if (psx / psy > 1.5 || (1.0 / (psx / psy)) > 1.5) {
                    finalPixelSize = Math.min(psx, psy);
                } else {
                    finalPixelSize = (psx + psy) / 2.0;
                }
                scaleCol = Math.round(w / finalPixelSize);
                scaleRow = Math.round(h / finalPixelSize);
            }

            updateProgress(50, '细化网格边界...');
            await new Promise(r => setTimeout(r, 10));

            const { xCoords, yCoords } = refineGrids(imageNd, Math.round(scaleCol), Math.round(scaleRow));

            updateProgress(70, '采样像素颜色...');
            await new Promise(r => setTimeout(r, 10));

            let sampled;
            if (method === 'majority') {
                sampled = sampleMajority(imageNd, xCoords, yCoords);
            } else {
                sampled = sampleCenter(imageNd, xCoords, yCoords);
            }

            updateProgress(90, '生成输出图像...');
            await new Promise(r => setTimeout(r, 10));

            const [resH, resW, resC] = sampled.shape;
            const outCanvas = document.createElement('canvas');
            outCanvas.width = resW;
            outCanvas.height = resH;
            const outCtx = outCanvas.getContext('2d');
            const outImageData = outCtx.createImageData(resW, resH);
            
            for (let y = 0; y < resH; y++) {
                for (let x = 0; x < resW; x++) {
                    const idx = (y * resW + x) * 4;
                    if (resC >= 3) {
                        outImageData.data[idx] = sampled.get(y, x, 0);
                        outImageData.data[idx + 1] = sampled.get(y, x, 1);
                        outImageData.data[idx + 2] = sampled.get(y, x, 2);
                        outImageData.data[idx + 3] = (resC === 4) ? sampled.get(y, x, 3) : 255;
                    } else {
                        const val = sampled.get(y, x, 0);
                        outImageData.data[idx] = val;
                        outImageData.data[idx + 1] = val;
                        outImageData.data[idx + 2] = val;
                        outImageData.data[idx + 3] = 255;
                    }
                }
            }
            outCtx.putImageData(outImageData, 0, 0);

            return {
                canvas: outCanvas,
                gridSize: { w: resW, h: resH }
            };
        }

        function createNdArray(data, shape) {
            const stride = [];
            let s = 1;
            for (let i = shape.length - 1; i >= 0; i--) {
                stride[i] = s;
                s *= shape[i];
            }
            return {
                data, shape, stride, offset: 0, size: data.length,
                get(...indices) {
                    let idx = 0;
                    for (let i = 0; i < indices.length; i++) idx += indices[i] * stride[i];
                    return data[idx];
                },
                set(...args) {
                    const val = args.pop();
                    let idx = 0;
                    for (let i = 0; i < args.length; i++) idx += args[i] * stride[i];
                    data[idx] = val;
                }
            };
        }

        function rgbToGray(imageRgb) {
            const [h, w, c] = imageRgb.shape;
            const grayData = new Float32Array(h * w);
            const gray = createNdArray(grayData, [h, w]);
            for (let i = 0; i < h; i++) {
                for (let j = 0; j < w; j++) {
                    if (c >= 3) {
                        gray.set(i, j, 0.299 * imageRgb.get(i, j, 0) + 0.587 * imageRgb.get(i, j, 1) + 0.114 * imageRgb.get(i, j, 2));
                    } else {
                        gray.set(i, j, imageRgb.get(i, j, 0));
                    }
                }
            }
            return gray;
        }

        function conv2dSame(image, kernel) {
            const [ih, iw] = image.shape;
            const [kh, kw] = kernel.shape;
            const ph = Math.floor(kh / 2);
            const pw = Math.floor(kw / 2);
            const out = createNdArray(new Float32Array(ih * iw), [ih, iw]);
            for (let i = 0; i < ih; i++) {
                for (let j = 0; j < iw; j++) {
                    let sum = 0;
                    for (let ky = 0; ky < kh; ky++) {
                        for (let kx = 0; kx < kw; kx++) {
                            let py = i + ky - ph;
                            let px = j + kx - pw;
                            py = Math.min(Math.max(py, 0), ih - 1);
                            px = Math.min(Math.max(px, 0), iw - 1);
                            sum += image.get(py, px) * kernel.get(ky, kx);
                        }
                    }
                    out.set(i, j, sum);
                }
            }
            return out;
        }

        function sobelXy(gray, ksize = 3) {
            let kx, ky;
            if (ksize === 3) {
                kx = createNdArray(new Float32Array([-1, 0, 1, -2, 0, 2, -1, 0, 1]), [3, 3]);
                ky = createNdArray(new Float32Array([-1, -2, -1, 0, 0, 0, 1, 2, 1]), [3, 3]);
            } else {
                throw new Error("ksize must be 3");
            }
            const gx = conv2dSame(gray, kx);
            const gy = conv2dSame(gray, ky);
            return { gx, gy };
        }

        function nextPow2(n, max_val) {
            return Math.min(Math.pow(2, Math.ceil(Math.log2(n))), max_val);
        }

        function fft2d(dir, real, imag) {
            const [rows, cols] = real.shape;
            for (let i = 0; i < rows; i++) {
                const r = new Float32Array(cols);
                const m = new Float32Array(cols);
                for (let j = 0; j < cols; j++) {
                    r[j] = real.get(i, j);
                    m[j] = imag.get(i, j);
                }
                fft1d(dir, r, m);
                for (let j = 0; j < cols; j++) {
                    real.set(i, j, r[j]);
                    imag.set(i, j, m[j]);
                }
            }
            for (let j = 0; j < cols; j++) {
                const r = new Float32Array(rows);
                const m = new Float32Array(rows);
                for (let i = 0; i < rows; i++) {
                    r[i] = real.get(i, j);
                    m[i] = imag.get(i, j);
                }
                fft1d(dir, r, m);
                for (let i = 0; i < rows; i++) {
                    real.set(i, j, r[i]);
                    imag.set(i, j, m[i]);
                }
            }
        }

        function fft1d(dir, real, imag) {
            const n = real.length;
            if (n <= 1) return;
            let j = 0;
            for (let i = 0; i < n; i++) {
                if (i < j) {
                    [real[i], real[j]] = [real[j], real[i]];
                    [imag[i], imag[j]] = [imag[j], imag[i]];
                }
                let m = n >> 1;
                while (m >= 1 && j >= m) { j -= m; m >>= 1; }
                j += m;
            }
            for (let len = 2; len <= n; len <<= 1) {
                const angle = (2 * Math.PI * dir) / len;
                const wlen_r = Math.cos(angle);
                const wlen_i = Math.sin(angle);
                for (let i = 0; i < n; i += len) {
                    let w_r = 1, w_i = 0;
                    for (let k = 0; k < len / 2; k++) {
                        const u_r = real[i + k], u_i = imag[i + k];
                        const v_r = real[i + k + len / 2] * w_r - imag[i + k + len / 2] * w_i;
                        const v_i = real[i + k + len / 2] * w_i + imag[i + k + len / 2] * w_r;
                        real[i + k] = u_r + v_r;
                        imag[i + k] = u_i + v_i;
                        real[i + k + len / 2] = u_r - v_r;
                        imag[i + k + len / 2] = u_i - v_i;
                        const tmp_r = w_r * wlen_r - w_i * wlen_i;
                        w_i = w_r * wlen_i + w_i * wlen_r;
                        w_r = tmp_r;
                    }
                }
            }
            if (dir === -1) {
                for (let i = 0; i < n; i++) {
                    real[i] /= n;
                    imag[i] /= n;
                }
            }
        }

        function normalizeMinMax(x, a = 0.0, b = 1.0) {
            const size = x.size;
            const data = x.data;
            let mn = Infinity, mx = -Infinity;
            for (let i = 0; i < size; i++) {
                if (data[i] < mn) mn = data[i];
                if (data[i] > mx) mx = data[i];
            }
            const out = createNdArray(new Float32Array(size), x.shape);
            const diff = mx - mn;
            if (diff < 1e-8) {
                out.data.fill(a);
                return out;
            }
            for (let i = 0; i < size; i++) {
                out.data[i] = a + (b - a) * (data[i] - mn) / diff;
            }
            return out;
        }

        function computeFftMagnitude(grayImage) {
            const [h, w] = grayImage.shape;
            const ph = nextPow2(h, 1024);
            const pw = nextPow2(w, 1024);
            const real = createNdArray(new Float32Array(ph * pw), [ph, pw]);
            const imag = createNdArray(new Float32Array(ph * pw), [ph, pw]);
            real.data.fill(0);
            imag.data.fill(0);
            for (let i = 0; i < Math.min(h, ph); i++) {
                for (let j = 0; j < Math.min(w, pw); j++) {
                    real.set(i, j, grayImage.get(i, j));
                }
            }
            fft2d(1, real, imag);
            const mag = createNdArray(new Float32Array(ph * pw), [ph, pw]);
            const halfH = Math.floor(ph / 2);
            const halfW = Math.floor(pw / 2);
            for (let i = 0; i < ph; i++) {
                for (let j = 0; j < pw; j++) {
                    const ni = (i + halfH) % ph;
                    const nj = (j + halfW) % pw;
                    const r = real.get(ni, nj);
                    const im = imag.get(ni, nj);
                    const m = Math.sqrt(r * r + im * im);
                    mag.set(i, j, 1.0 - Math.log1p(m));
                }
            }
            return normalizeMinMax(mag, 0.0, 1.0);
        }

        function smooth1d(v, k = 17) {
            if (k < 3) return new Float32Array(v);
            if (k % 2 === 0) k += 1;
            const sigma = k / 6.0;
            const center = Math.floor(k / 2);
            const kernel = new Float32Array(k);
            let kernelSum = 0;
            for (let i = 0; i < k; i++) {
                const x = i - center;
                kernel[i] = Math.exp(-(x * x) / (2 * sigma * sigma));
                kernelSum += kernel[i];
            }
            const normSum = kernelSum + 1e-8;
            const out = new Float32Array(v.length);
            for (let i = 0; i < v.length; i++) {
                let acc = 0;
                for (let j = 0; j < k; j++) {
                    const idx = i + j - center;
                    if (idx >= 0 && idx < v.length) {
                        acc += v[idx] * (kernel[j] / normSum);
                    }
                }
                out[i] = acc;
            }
            return out;
        }

        function detectPeak(proj, relThr = 0.35, minDist = 6) {
            const center = Math.floor(proj.length / 2);
            let mx = 0;
            for (let i = 0; i < proj.length; i++) if (proj[i] > mx) mx = proj[i];
            if (mx < 1e-6) return null;
            const thr = mx * relThr;
            const candidates = [];
            for (let i = 1; i < proj.length - 1; i++) {
                let isPeak = true;
                for (let j = 1; j < 6; j++) {
                    if (i - j < 0 || i + j >= proj.length) continue;
                    if (proj[i - j + 1] < proj[i - j] || proj[i + j - 1] < proj[i + j]) {
                        isPeak = false;
                        break;
                    }
                }
                if (isPeak && proj[i] >= thr) {
                    let leftClimb = 0, rightFall = 0;
                    for (let k = i; k > 0; k--) {
                        if (proj[k] > proj[k - 1]) leftClimb = Math.abs(proj[i] - proj[k - 1]);
                        else break;
                    }
                    for (let k = i; k < proj.length - 1; k++) {
                        if (proj[k] > proj[k + 1]) rightFall = Math.abs(proj[i] - proj[k + 1]);
                        else break;
                    }
                    candidates.push({ index: i, score: Math.max(leftClimb, rightFall) });
                }
            }
            const left = candidates.filter(c => c.index < center - minDist && c.index > center * 0.15)
                .sort((a, b) => b.score - a.score);
            const right = candidates.filter(c => c.index > center + minDist && c.index < center * 1.85)
                .sort((a, b) => b.score - a.score);
            if (left.length === 0 || right.length === 0) return null;
            return {
                period: Math.abs(right[0].index - left[0].index) / 2,
                left: left[0].index,
                right: right[0].index
            };
        }

        function estimateGridFft(image) {
            const gray = rgbToGray(image);
            const mag = computeFftMagnitude(gray);
            const [PH, PW] = mag.shape;
            const bandRow = Math.floor(PW / 2);
            const bandCol = Math.floor(PH / 2);
            const rowSum = new Float32Array(PH);
            const colSum = new Float32Array(PW);
            for (let i = 0; i < PH; i++) {
                for (let j = Math.floor(PW / 2 - bandRow); j < Math.floor(PW / 2 + bandRow); j++) {
                    if (j >= 0 && j < PW) rowSum[i] += mag.get(i, j);
                }
            }
            for (let j = 0; j < PW; j++) {
                for (let i = Math.floor(PH / 2 - bandCol); i < Math.floor(PH / 2 + bandCol); i++) {
                    if (i >= 0 && i < PH) colSum[j] += mag.get(i, j);
                }
            }
            const normRow = normalizeMinMax(createNdArray(rowSum, [PH])).data;
            const normCol = normalizeMinMax(createNdArray(colSum, [PW])).data;
            const smoothRow = smooth1d(normRow, 17);
            const smoothCol = smooth1d(normCol, 17);
            const rowResult = detectPeak(smoothRow);
            const colResult = detectPeak(smoothCol);
            const [H, W] = image.shape;
            return {
                scaleRow: rowResult ? rowResult.period * H / PH : null,
                scaleCol: colResult ? colResult.period * W / PW : null
            };
        }

        function estimateGridGradient(image) {
            const gray = rgbToGray(image);
            const [H, W] = gray.shape;
            const { gx, gy } = sobelXy(gray, 3);
            const gXSum = new Float32Array(W), gYSum = new Float32Array(H);
            for (let i = 0; i < H; i++) for (let j = 0; j < W; j++) {
                gXSum[j] += Math.abs(gx.get(i, j));
                gYSum[i] += Math.abs(gy.get(i, j));
            }
            const findPeaks = (arr, thr) => {
                const p = [];
                for (let i = 1; i < arr.length - 1; i++) {
                    if (arr[i] > arr[i-1] && arr[i] > arr[i+1] && arr[i] >= thr) {
                        if (p.length === 0 || i - p[p.length-1] >= 4) p.push(i);
                    }
                }
                return p;
            };
            let mxX = 0, mxY = 0;
            for (let v of gXSum) if (v > mxX) mxX = v;
            for (let v of gYSum) if (v > mxY) mxY = v;
            const pX = findPeaks(gXSum, mxX * 0.2);
            const pY = findPeaks(gYSum, mxY * 0.2);
            if (pX.length < 4 || pY.length < 4) return null;
            const getMedian = (p) => {
                const d = [];
                for (let i = 1; i < p.length; i++) d.push(p[i] - p[i-1]);
                d.sort((a, b) => a - b);
                const mid = Math.floor(d.length / 2);
                return d.length % 2 !== 0 ? d[mid] : (d[mid - 1] + d[mid]) / 2;
            };
            return { scaleCol: W / getMedian(pX), scaleRow: H / getMedian(pY) };
        }

        function findBestGrid(origin, rangeMin, rangeMax, gradMag) {
            let best = Math.round(origin);
            const peaks = [];
            let mx = 0;
            for (let i = 0; i < gradMag.length; i++) if (gradMag[i] > mx) mx = gradMag[i];
            if (mx < 1e-6) return best;
            const relThr = mx * 0;
            const lo = -Math.round(rangeMin);
            const hi = Math.round(rangeMax);
            for (let i = lo; i <= hi; i++) {
                const candidate = Math.round(origin + i);
                if (candidate <= 0 || candidate >= gradMag.length - 1) continue;
                if (gradMag[candidate] > gradMag[candidate - 1] &&
                    gradMag[candidate] > gradMag[candidate + 1] &&
                    gradMag[candidate] >= relThr) {
                    peaks.push({ val: gradMag[candidate], idx: candidate });
                }
            }
            if (peaks.length === 0) return best;
            peaks.sort((a, b) => b.val - a.val);
            return peaks[0].idx;
        }

        function refineGrids(image, gridX, gridY) {
            const [H, W] = image.shape;
            const cellW = W / gridX;
            const cellH = H / gridY;
            const gray = rgbToGray(image);
            const { gx, gy } = sobelXy(gray, 3);
            const gradXSum = new Float32Array(W);
            const gradYSum = new Float32Array(H);
            for (let i = 0; i < H; i++) {
                for (let j = 0; j < W; j++) {
                    gradXSum[j] += Math.abs(gx.get(i, j));
                    gradYSum[i] += Math.abs(gy.get(i, j));
                }
            }
            let xCoords = [];
            let yCoords = [];
            let x = findBestGrid(W / 2, cellW, cellW, gradXSum);
            while (x < W + cellW / 2) {
                x = findBestGrid(x, cellW / 3, cellW / 3, gradXSum);
                xCoords.push(x);
                x += cellW;
            }
            x = findBestGrid(W / 2, cellW, cellW, gradXSum) - cellW;
            while (x > -cellW/2 && xCoords.length <= W/cellW) {
                x = findBestGrid(x, cellW / 3, cellW / 3, gradXSum);
                xCoords.push(x);
                x -= cellW;
            }
            let y = findBestGrid(H / 2, cellH, cellH, gradYSum);
            while (y < H + cellH/2) {
                y = findBestGrid(y, cellH / 3, cellH / 3, gradYSum);
                yCoords.push(y);
                y += cellH;
            }
            y = findBestGrid(H / 2, cellH, cellH, gradYSum) - cellH;
            while (y > -cellH/2 && yCoords.length <= H/cellH) {
                y = findBestGrid(y, cellH / 3, cellH / 3, gradYSum);
                yCoords.push(y);
                y -= cellH;
            }
            if (Math.abs(xCoords.length - yCoords.length) < 2) {
                const targetLen = Math.max(xCoords.length, yCoords.length);
                while (xCoords.length < targetLen) xCoords.push(0);
                while (yCoords.length < targetLen) yCoords.push(0);
            }
            return {
                xCoords: xCoords.sort((a, b) => a - b),
                yCoords: yCoords.sort((a, b) => a - b)
            };
        }

        function sampleCenter(image, xCoords, yCoords) {
            const ny = yCoords.length - 1;
            const nx = xCoords.length - 1;
            const C = image.shape[2];
            const out = createNdArray(new Float32Array(ny * nx * C), [ny, nx, C]);
            for (let j = 0; j < ny; j++) {
                const cy = Math.floor((yCoords[j] + yCoords[j + 1]) * 0.5);
                for (let i = 0; i < nx; i++) {
                    const cx = Math.floor((xCoords[i] + xCoords[i + 1]) * 0.5);
                    for (let k = 0; k < C; k++) {
                        out.set(j, i, k, image.get(cy, cx, k));
                    }
                }
            }
            return out;
        }

        function sampleMajority(image, xCoords, yCoords) {
            const [H, W, C] = image.shape;
            const ny = yCoords.length - 1;
            const nx = xCoords.length - 1;
            const out = createNdArray(new Float32Array(ny * nx * C), [ny, nx, C]);
            for (let j = 0; j < ny; j++) {
                let y0 = Math.max(0, Math.min(H, Math.floor(yCoords[j])));
                let y1 = Math.max(0, Math.min(H, Math.floor(yCoords[j + 1])));
                if (y1 <= y0) y1 = Math.min(y0 + 1, H);
                for (let i = 0; i < nx; i++) {
                    let x0 = Math.max(0, Math.min(W, Math.floor(xCoords[i])));
                    let x1 = Math.max(0, Math.min(W, Math.floor(xCoords[i + 1])));
                    if (x1 <= x0) x1 = Math.min(x0 + 1, W);
                    const cellPixels = [];
                    for (let py = y0; py < y1; py++) {
                        for (let px = x0; px < x1; px++) {
                            const p = new Float32Array(C);
                            for (let k = 0; k < C; k++) p[k] = image.get(py, px, k);
                            cellPixels.push(p);
                        }
                    }
                    if (cellPixels.length === 0) {
                        for (let k = 0; k < C; k++) out.set(j, i, k, 0);
                        continue;
                    }
                    let c0 = new Float32Array(cellPixels[0]);
                    let c1 = new Float32Array(cellPixels[0]);
                    let maxDist = -1;
                    for (let s = 0; s < cellPixels.length; s++) {
                        let d = 0;
                        for (let k = 0; k < C; k++) d += Math.pow(cellPixels[s][k] - c0[k], 2);
                        if (d > maxDist) { maxDist = d; c1 = new Float32Array(cellPixels[s]); }
                    }
                    let finalC = c0;
                    for (let it = 0; it < 3; it++) {
                        let sum0 = new Float32Array(C), count0 = 0;
                        let sum1 = new Float32Array(C), count1 = 0;
                        for (let s = 0; s < cellPixels.length; s++) {
                            let d0 = 0, d1 = 0;
                            for (let k = 0; k < C; k++) {
                                d0 += Math.pow(cellPixels[s][k] - c0[k], 2);
                                d1 += Math.pow(cellPixels[s][k] - c1[k], 2);
                            }
                            if (d1 < d0) {
                                for (let k = 0; k < C; k++) sum1[k] += cellPixels[s][k];
                                count1++;
                            } else {
                                for (let k = 0; k < C; k++) sum0[k] += cellPixels[s][k];
                                count0++;
                            }
                        }
                        if (count0 > 0) for (let k = 0; k < C; k++) c0[k] = sum0[k] / count0;
                        if (count1 > 0) for (let k = 0; k < C; k++) c1[k] = sum1[k] / count1;
                        finalC = (count1 >= count0) ? c1 : c0;
                    }
                    for (let k = 0; k < C; k++) out.set(j, i, k, finalC[k]);
                }
            }
            return out;
        }
    </script>
