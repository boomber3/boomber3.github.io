<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播正计时（自动计时+隐藏按钮）</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: transparent;
            font-family: "微软雅黑", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            position: relative;
            text-align: center;
        }
        .stopwatch {
            font-size: 40px;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 5px #00000080;
            background: transparent;
            border: none;
            cursor: default;
        }
        .controls {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 10px;
            display: none;
            gap: 8px;
            z-index: 100;
        }
        .container:hover .controls {
            display: flex;
        }
        .btn {
            padding: 6px 16px;
            font-size: 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #fff;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-reset {
            background: #ff6b6b;
            color: white;
        }
        .btn-reset:hover {
            background: #ff5252;
        }
        .btn-record {
            background: #4ecdc4;
            color: white;
        }
        .btn-record:hover {
            background: #45b7af;
        }
        .records {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 60px;
            display: none;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
        }
        .container:hover .records {
            display: flex;
        }
        .record-item {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 14px;
            white-space: nowrap;
        }
        .record-time {
            color: #4ecdc4;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="stopwatch" class="stopwatch">0小时0分钟0秒</div>
        <div class="controls">
            <button id="startBtn" class="btn">开始/继续</button>
            <button id="pauseBtn" class="btn" disabled>暂停</button>
            <button id="recordBtn" class="btn btn-record">记录</button>
            <button id="resetBtn" class="btn btn-reset">重置</button>
        </div>
        <div id="records" class="records"></div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        const stopwatchEl = document.getElementById('stopwatch');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const recordBtn = document.getElementById('recordBtn');
        const recordsEl = document.getElementById('records');
        const STORAGE_KEY = 'live_stopwatch_data';
        const RECORDS_KEY = 'live_stopwatch_records';

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return `${hours}小时${minutes}分钟${seconds}秒`;
        }

        function saveData() {
            const data = {
                elapsedTime: elapsedTime,
                isRunning: timerInterval !== null
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                elapsedTime = data.elapsedTime;
                stopwatchEl.textContent = formatTime(elapsedTime);
            }
            startTimer();
        }

        function startTimer() {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                stopwatchEl.textContent = formatTime(elapsedTime);
                saveData();
            }, 1000);
            startBtn.disabled = true;
            pauseBtn.disabled = false;
        }

        pauseBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            timerInterval = null;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            saveData();
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            timerInterval = null;
            elapsedTime = 0;
            stopwatchEl.textContent = '0小时0分钟0秒';
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(RECORDS_KEY);
            renderRecords();
        });

        function addRecord() {
            const recordTime = formatTime(elapsedTime);
            const records = JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]');
            const recordEntry = {
                time: recordTime,
                timestamp: Date.now()
            };
            records.push(recordEntry);
            if (records.length > 10) {
                records.shift();
            }
            localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
            renderRecords();
        }

        function renderRecords() {
            const records = JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]');
            if (records.length === 0) {
                recordsEl.style.display = 'none';
                return;
            }
            recordsEl.style.display = 'flex';
            recordsEl.innerHTML = records.map((r, i) => 
                `<div class="record-item">记录${i + 1}: <span class="record-time">${r.time}</span></div>`
            ).join('');
        }

        recordBtn.addEventListener('click', addRecord);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (timerInterval !== null) {
                    pauseBtn.click();
                } else {
                    startBtn.click();
                }
            } else if (e.code === 'KeyR') {
                e.preventDefault();
                addRecord();
            }
        });

        window.onload = () => {
            loadData();
            renderRecords();
        };
    </script>
</body>
</html>
