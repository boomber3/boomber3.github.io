<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绿幕抠图 - 在线工具</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 20px;
            background: var(--bg-color, #f5f5f5);
            font-family: "微软雅黑", Arial, sans-serif;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: #409eff;
            background: #f0f7ff;
        }
        .upload-area.dragover {
            border-color: #409eff;
            background: #f0f7ff;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        .upload-hint {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }
        input[type="file"] {
            display: none;
        }
        .settings {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        .setting-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
        }
        .setting-item {
            flex: 1;
            min-width: 180px;
        }
        .setting-item label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .setting-item input[type="color"] {
            width: 60px;
            height: 32px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            vertical-align: middle;
        }
        .setting-item input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        .setting-item input[type="number"] {
            width: 80px;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .setting-item .value {
            color: #666;
            font-size: 12px;
            margin-left: 8px;
        }
        .size-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .size-inputs span {
            color: #666;
        }
        .lock-ratio {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }
        .lock-ratio input {
            width: 16px;
            height: 16px;
        }
        .preview-area {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .preview-box {
            flex: 1;
            min-width: 0;
        }
        .preview-box h3 {
            text-align: center;
            color: #333;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .preview-image {
            width: 100%;
            height: 350px;
            background: repeating-conic-gradient(#808080 0% 25%, #fff 0% 50%) 50% / 20px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .preview-image img, 
        .preview-image canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .preview-placeholder {
            color: #999;
            font-size: 14px;
        }
        .preview-size {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .btn-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .btn {
            flex: 1;
            padding: 14px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #409eff;
            color: white;
        }
        .btn-primary:hover {
            background: #66b1ff;
        }
        .btn-primary:disabled {
            background: #c0c4cc;
            cursor: not-allowed;
        }
        .btn-success {
            background: #67c23a;
            color: white;
        }
        .btn-success:hover {
            background: #85ce61;
        }
        .btn-success:disabled {
            background: #c0c4cc;
            cursor: not-allowed;
        }
        .tips {
            margin-top: 20px;
            padding: 16px;
            background: #fdf6ec;
            border-radius: 8px;
            color: #e6a23c;
            font-size: 14px;
        }
        .tips strong {
            display: block;
            margin-bottom: 8px;
        }
        .processing {
            display: none;
            text-align: center;
            padding: 20px;
            color: #409eff;
        }
        .processing.active {
            display: block;
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #409eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .checkbox-wrapper input {
            width: 16px;
            height: 16px;
        }
        .checkbox-wrapper label {
            font-weight: normal;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ 绿幕抠图工具</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽图片到此处</div>
            <div class="upload-hint">支持 PNG、JPG 格式</div>
            <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg">
        </div>
        
        <div class="settings">
            <div class="setting-row">
                <div class="setting-item">
                    <label>抠图颜色</label>
                    <input type="color" id="bgColor" value="#00ff00">
                    <span class="value" id="bgColorValue">绿色</span>
                </div>
                <div class="setting-item">
                    <label>颜色容差</label>
                    <input type="range" id="tolerance" min="1" max="100" value="40">
                    <span class="value" id="toleranceValue">40</span>
                </div>
                <div class="setting-item">
                    <label>边缘平滑</label>
                    <input type="range" id="smooth" min="0" max="10" value="1">
                    <span class="value" id="smoothValue">1</span>
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-item">
                    <label>输出尺寸</label>
                    <div class="size-inputs">
                        <input type="number" id="outputWidth" value="1920" min="1" max="4096">
                        <span>×</span>
                        <input type="number" id="outputHeight" value="1080" min="1" max="4096">
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="keepRatio" checked>
                        <label for="keepRatio">保持纵横比</label>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="preview-area">
            <div class="preview-box">
                <h3>原始图片</h3>
                <div class="preview-image" id="originalPreview">
                    <span class="preview-placeholder">等待上传...</span>
                </div>
            </div>
            <div class="preview-box">
                <h3>抠图结果（实时预览）</h3>
                <div class="preview-image" id="resultPreview">
                    <span class="preview-placeholder">等待处理...</span>
                </div>
            </div>
        </div>
        
        <div class="processing" id="processing">
            <span class="spinner"></span>
            <span>正在处理中...</span>
        </div>
        
        <div class="btn-row">
            <button class="btn btn-primary" id="processBtn" disabled>开始抠图</button>
            <button class="btn btn-success" id="downloadBtn" disabled>下载透明图</button>
        </div>
        
        <div class="tips">
            <strong>💡 使用提示</strong>
            1. 上传绿幕（或蓝幕、红幕）图片<br>
            2. 选择背景颜色<br>
            3. 调整容差值控制抠图范围<br>
            4. 设置输出尺寸（保持纵横比可锁定比例）<br>
            5. 调整参数后自动实时预览抠图效果<br>
            6. 点击"下载透明图"保存结果
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const bgColorInput = document.getElementById('bgColor');
        const bgColorValue = document.getElementById('bgColorValue');
        const toleranceInput = document.getElementById('tolerance');
        const toleranceValue = document.getElementById('toleranceValue');
        const smoothInput = document.getElementById('smooth');
        const smoothValue = document.getElementById('smoothValue');
        const outputWidthInput = document.getElementById('outputWidth');
        const outputHeightInput = document.getElementById('outputHeight');
        const keepRatioCheckbox = document.getElementById('keepRatio');
        const originalPreview = document.getElementById('originalPreview');
        const resultPreview = document.getElementById('resultPreview');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const processing = document.getElementById('processing');
        
        let originalImage = null;
        let processedCanvas = null;
        let originalWidth = 0;
        let originalHeight = 0;
        let debounceTimer = null;
        
        const colorNames = {
            '#00ff00': '绿色',
            '#0000ff': '蓝色',
            '#ff0000': '红色',
            '#ffffff': '白色',
            '#000000': '黑色'
        };
        
        function initEventListeners() {
            bgColorInput.addEventListener('input', () => {
                const color = bgColorInput.value;
                bgColorValue.textContent = colorNames[color.toLowerCase()] || color;
                debouncePreview();
            });
            
            toleranceInput.addEventListener('input', () => {
                toleranceValue.textContent = toleranceInput.value;
                debouncePreview();
            });
            
            smoothInput.addEventListener('input', () => {
                smoothValue.textContent = smoothInput.value;
                debouncePreview();
            });
            
            outputWidthInput.addEventListener('input', () => {
                if (keepRatioCheckbox.checked && originalWidth > 0 && originalHeight > 0) {
                    const ratio = originalHeight / originalWidth;
                    outputHeightInput.value = Math.round(outputWidthInput.value * ratio);
                }
                debouncePreview();
            });
            
            outputHeightInput.addEventListener('input', () => {
                if (keepRatioCheckbox.checked && originalWidth > 0 && originalHeight > 0) {
                    const ratio = originalWidth / originalHeight;
                    outputWidthInput.value = Math.round(outputHeightInput.value * ratio);
                }
                debouncePreview();
            });
            
            keepRatioCheckbox.addEventListener('change', () => {
                if (keepRatioCheckbox.checked && originalWidth > 0 && originalHeight > 0) {
                    const ratio = originalHeight / originalWidth;
                    outputHeightInput.value = Math.round(outputWidthInput.value * ratio);
                }
            });
        }
        
        function debouncePreview() {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                if (originalImage) {
                    processAndPreview();
                }
            }, 150);
        }
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            if (!file.type.match(/image\/(png|jpeg|jpg)/)) {
                alert('请上传 PNG 或 JPG 格式的图片');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    originalWidth = img.width;
                    originalHeight = img.height;
                    
                    originalPreview.innerHTML = `<img src="${e.target.result}" alt="原始图片"><span class="preview-size">${originalWidth} × ${originalHeight}</span>`;
                    
                    outputWidthInput.value = originalWidth;
                    outputHeightInput.value = originalHeight;
                    
                    processBtn.disabled = false;
                    
                    processAndPreview();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function processAndPreview() {
            if (!originalImage) return;
            
            processing.classList.add('active');
            
            requestAnimationFrame(() => {
                try {
                    const result = processImage();
                    processedCanvas = result.canvas;
                    
                    resultPreview.innerHTML = '';
                    resultPreview.appendChild(processedCanvas);
                    
                    const outW = outputWidthInput.value;
                    const outH = outputHeightInput.value;
                    resultPreview.innerHTML += `<span class="preview-size">${outW} × ${outH}</span>`;
                    
                    downloadBtn.disabled = false;
                } catch (e) {
                    console.error('处理失败:', e);
                }
                processing.classList.remove('active');
            });
        }
        
        function processImage() {
            const outputWidth = parseInt(outputWidthInput.value) || originalImage.width;
            const outputHeight = parseInt(outputHeightInput.value) || originalImage.height;
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = outputWidth;
            canvas.height = outputHeight;
            
            ctx.drawImage(originalImage, 0, 0, outputWidth, outputHeight);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            const targetColor = hexToRgb(bgColorInput.value);
            const tolerance = parseInt(toleranceInput.value);
            const smooth = parseInt(smoothInput.value);
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                const distance = colorDistance(
                    r, g, b,
                    targetColor.r, targetColor.g, targetColor.b
                );
                
                if (distance < tolerance) {
                    const alpha = Math.max(0, 1 - distance / tolerance);
                    data[i + 3] = Math.round(alpha * 255);
                }
            }
            
            if (smooth > 0) {
                applySmoothing(imageData, smooth);
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            return { canvas };
        }
        
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 255, b: 0 };
        }
        
        function colorDistance(r1, g1, b1, r2, g2, b2) {
            return Math.sqrt(
                Math.pow(r1 - r2, 2) +
                Math.pow(g1 - g2, 2) +
                Math.pow(b1 - b2, 2)
            );
        }
        
        function applySmoothing(imageData, iterations) {
            const width = imageData.width;
            const height = imageData.height;
            const data = imageData.data;
            
            for (let iter = 0; iter < iterations; iter++) {
                const temp = new Uint8ClampedArray(data);
                
                for (let y = 1; y < height - 1; y++) {
                    for (let x = 1; x < width - 1; x++) {
                        const idx = (y * width + x) * 4;
                        
                        if (data[idx + 3] < 128) {
                            let alphaSum = 0;
                            let count = 0;
                            
                            for (let dy = -1; dy <= 1; dy++) {
                                for (let dx = -1; dx <= 1; dx++) {
                                    const nidx = ((y + dy) * width + (x + dx)) * 4;
                                    alphaSum += temp[nidx + 3];
                                    count++;
                                }
                            }
                            
                            const avgAlpha = alphaSum / count;
                            if (avgAlpha > 128) {
                                data[idx + 3] = avgAlpha;
                            }
                        }
                    }
                }
            }
        }
        
        processBtn.addEventListener('click', processAndPreview);
        
        downloadBtn.addEventListener('click', () => {
            if (!processedCanvas) return;
            
            const link = document.createElement('a');
            link.download = 'transparent_image.png';
            link.href = processedCanvas.toDataURL('image/png');
            link.click();
        });
        
        initEventListeners();
    </script>
</body>
</html>
